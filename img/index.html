<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Background Image</title>
    <style>
      /* Background halaman penuh */

      body {
        background-image: url("bg.webp");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        background-repeat: no-repeat;
        margin: 0;
      }
      /* Kotak dengan background berbeda */
      .kotak {
        background-image: url("pola.png");
        background-repeat: repeat;
        background-size: 50px 50px;
        width: 300px;
        height: 200px;
        padding: 20px;
        color: white;
        text-shadow: 1px 1px 3px black;
      }
    </style>
  </head>
  <body>
    <div class="kotak">
      <h2>Judul dengan Background Pola</h2>
      <p>Konten di dalam kotak.</p>
    </div>
  </body>
</html>
