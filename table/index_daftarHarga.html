<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Inline CSS</title>
</head>
<body>

    <table style="width: 100%; border-collapse: collapse; font-family: Arial, sans-serif; table-layout: fixed;">
        <caption style="font-weight: bold; font-size: 20px; margin-bottom: 10px; color: black;">
            Daftar Harga Produk
        </caption>
        <thead>
            <tr>
                <th style="border: 1px solid #ccc; padding: 12px; text-align: center; background-color: #00a86b; color: white;">Kategori</th>
                <th style="border: 1px solid #ccc; padding: 12px; text-align: center; background-color: #00a86b; color: white;">Produk</th>
                <th style="border: 1px solid #ccc; padding: 12px; text-align: center; background-color: #00a86b; color: white;">Harga</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td rowspan="2" style="border: 1px solid #ccc; padding: 12px; text-align: left;">Elektronik</td>
                <td style="border: 1px solid #ccc; padding: 12px; text-align: left;">Laptop</td>
                <td style="border: 1px solid #ccc; padding: 12px; text-align: left; font-weight: bold;">Rp 8.000.000</td>
            </tr>
            <tr>
                <td style="border: 1px solid #ccc; padding: 12px; text-align: left;">Smartphone</td>
                <td style="border: 1px solid #ccc; padding: 12px; text-align: left; font-weight: bold;">Rp 4.000.000</td>
            </tr>
            <tr style="background-color: #fff9db;">
                <td colspan="2" style="border: 1px solid #ccc; padding: 12px; text-align: left; font-weight: bold;">
                    Paket Bundling (Laptop + Mouse)
                </td>
                <td style="border: 1px solid #ccc; padding: 12px; text-align: left; font-weight: bold;">
                    Rp 8.200.000
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
