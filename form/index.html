<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tugas 8 Formulir</title>
  </head>
  <body>
    <header>
      <h2>Formulir Data Pribadi</h2>
    </header>
    <form>
      <section>
        <fieldset>
          <legend>Data Pribadi</legend>
          <label for="name">Nama:</label>
          <br />
          <input
            type="name"
            id="name"
            name="name"
            placeholder="Masukkan nama lengkap"
          />
          <br /><br />
          <label for="email">Email:</label>
          <br />
          <input
            type="email"
            id="email"
            name="email"
            placeholder="contoh123@gmail.com"
          />
          <br /><br />
          <label for="telp">No. Telepon:</label>
          <br />
          <input type="tel" id="telp" name="telp" placeholder="08xxxxxxxxxx" />
          <br /><br />
          <label for="alamat">Alamat:</label>
          <br />
          <input
            type="text"
            id="alamat"
            name="alamat"
            placeholder="Masukkan alamat lengkap"
          />
          <br /><br />
          <label for="kota">Tempat Lahir:</label>
          <br />
          <input
            type="text"
            id="kota"
            name="kota"
            placeholder="Masukkan tempat lahir"
          />
          <br /><br />
          <label for="tanggal">Tanggal Lahir:</label>
          <br />
          <input type="date" id="tanggal" name="tanggal" />
          <br /><br />
          <label for="kelamin">Jenis Kelamin:</label>
          <br />
          <input type="radio" id="laki" name="kelamin" value="Laki-laki" />
          <label for="laki">Laki-laki</label>
          <input type="radio" id="perempuan" name="kelamin" value="Perempuan" />
          <label for="perempuan">Perempuan</label>
        </fieldset>
      </section>
      <br />
      <section>
        <fieldset>
          <legend>Data Akademik</legend>
          <label for="study">Program Studi:</label>
          <br />
          <select id="study" name="study">
            <option value="" disabled selected>Pilih Program Studi</option>
            <option value="Teknik Informatika">S1 Teknik Informatika</option>
            <option value="Management Informatika">
              D3 Management Informatika
            </option>
          </select>
          <br /><br />
          <label for="sekolah">Asal Sekolah:</label>
          <br />
          <input type="radio" id="sekolah-sma" name="sekolah" value="SMA" />
          <label for="sekolah-sma">SMA</label>
          <input type="radio" id="sekolah-smk" name="sekolah" value="SMK" />
          <label for="sekolah-smk">SMK</label>
          <input type="radio" id="sekolah-ma" name="sekolah" value="MA" />
          <label for="sekolah-ma">MA</label>
          <br /><br />
          <label for="nama-sekolah">Nama Sekolah:</label>
          <br />
          <input
            type="text"
            id="nama-sekolah"
            name="nama-sekolah"
            value=""
            placeholder="Masukkan nama sekolah"
          />
          <br /><br />
          <label for="foto">Upload Foto:</label>
          <br />
          <input type="file" id="foto" name="foto" />
          <br /><br />
          <label for="pesan">Pesan:</label>
          <br />
          <textarea
            name="pesan"
            id="pesan"
            cols="30"
            rows="7"
            placeholder="Ketikkan pesan yang ingin disampaikan"
          ></textarea>
          <br /><br />
        </fieldset>
        <input type="submit" value="Daftar" />
        <input type="reset" value="Reset" />
      </section>
    </form>
  </body>
</html>
